<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a4a7a"/>
      <stop offset="50%" stop-color="#1a7a9a"/>
      <stop offset="100%" stop-color="#2ab5b5"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#ffb300"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Glow effect -->
  <circle cx="96" cy="60" r="70" fill="url(#glow)"/>
  <!-- Star/sparkle icon -->
  <path d="M96 25 L102 55 L132 60 L102 65 L96 95 L90 65 L60 60 L90 55 Z" fill="url(#star)"/>
  <!-- Small sparkles -->
  <circle cx="55" cy="40" r="4" fill="#ffe066" opacity="0.8"/>
  <circle cx="140" cy="35" r="3" fill="#ffe066" opacity="0.6"/>
  <circle cx="150" cy="70" r="5" fill="#ffe066" opacity="0.7"/>
  <circle cx="45" cy="80" r="3" fill="#ffe066" opacity="0.5"/>
  <!-- Avatar text curve - decorative -->
  <path d="M60 120 Q96 105 132 120" stroke="#7dd3fc" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M55 130 Q96 115 137 130" stroke="#7dd3fc" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Pulses/waves -->
  <circle cx="96" cy="96" r="45" fill="none" stroke="#7dd3fc" stroke-width="1" opacity="0.2"/>
  <circle cx="96" cy="96" r="55" fill="none" stroke="#7dd3fc" stroke-width="0.8" opacity="0.1"/>
</svg>
